name: Daily cyber digest

on:
  schedule:
    # 05:30 UTC = 07:30 Paris (summer) / 06:30 (winter). GitHub cron is always UTC.
    - cron: "30 5 * * *"
  workflow_dispatch: {}   # lets you trigger a run by hand from the Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build and send digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python digest.py
