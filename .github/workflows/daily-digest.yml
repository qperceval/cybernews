name: Daily cyber digest

on:
  schedule:
    # Odd minute, off the :00/:30 rush, to reduce GitHub's queue delay.
    # timezone handles CEST/CET automatically — no more winter drift.
    - cron: "23 7 * * *"
      timezone: "Europe/Paris"
  workflow_dispatch: {}   # lets you trigger a run by hand from the Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build and send digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python digest.py
